name: GifKeyboard
options:
  bundleIdPrefix: com.gifkeyboard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  GifKeyboard:
    type: application
    platform: iOS
    sources:
      - GifKeyboard
      - Shared
    entitlements:
      path: GifKeyboard/GifKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gifkeyboard.shared
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.gifkeyboard.app
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.gifkeyboard.app
    info:
      path: GifKeyboard/Info.plist
      properties:
        NSUbiquitousContainers:
          iCloud.com.gifkeyboard.app:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: One
            NSUbiquitousContainerName: GifKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gifkeyboard.app
        INFOPLIST_FILE: GifKeyboard/Info.plist
    dependencies:
      - target: GifKeyboardExtension

  GifKeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - GifKeyboardExtension
      - Shared
    entitlements:
      path: GifKeyboardExtension/GifKeyboardExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gifkeyboard.shared
    info:
      path: GifKeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: GifKeyboard
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: false
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gifkeyboard.app.keyboard
        INFOPLIST_FILE: GifKeyboardExtension/Info.plist

  GifKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GifKeyboardTests
      - Shared
    info:
      path: GifKeyboardTests/Info.plist
    dependencies:
      - target: GifKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gifkeyboard.app.tests
        INFOPLIST_FILE: GifKeyboardTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GifKeyboard.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GifKeyboard"
        BUNDLE_LOADER: "$(TEST_HOST)"
